plan:
  name: Training XOC-512 1x OPG-512 Clos RO
  status: draft
  description: Compute-only DIET translation of the OPG-512 rail-optimized air-cooled training reference architecture. Non-compute endpoint counts remain intentionally excluded pending source confirmation.

switch_classes:
  - switch_class_id: fe-leaf
    fabric_name: frontend
    fabric_class: managed
    hedgehog_role: server-leaf
    device_type_extension: ds5000_ext
    mclag_pair: false
    redundancy_type: mclag
    redundancy_group: fe-mclag
  - switch_class_id: fe-spine
    fabric_name: frontend
    fabric_class: managed
    hedgehog_role: spine
    device_type_extension: ds5000_ext
    uplink_ports_per_switch: 0
    mclag_pair: false
  - switch_class_id: be-rail-leaf
    fabric_name: backend
    fabric_class: managed
    hedgehog_role: server-leaf
    device_type_extension: ds5000_ext
    mclag_pair: false
  - switch_class_id: be-spine
    fabric_name: backend
    fabric_class: managed
    hedgehog_role: spine
    device_type_extension: ds5000_ext
    uplink_ports_per_switch: 0
    mclag_pair: false

switch_port_zones:
  - switch_class: fe-leaf
    zone_name: fe-server-ports
    transceiver_module_type: xcvr_generic_200g
    zone_type: server
    port_spec: 1-63:2
    breakout_option: b_4x200
    allocation_strategy: sequential
    priority: 10
  - switch_class: fe-leaf
    zone_name: fe-uplinks
    transceiver_module_type: xcvr_generic_200g
    zone_type: uplink
    port_spec: 2-64:2
    breakout_option: b_1x800
    allocation_strategy: sequential
    priority: 20
  - switch_class: fe-spine
    zone_name: fe-fabric-downlinks
    transceiver_module_type: xcvr_generic_200g
    zone_type: fabric
    port_spec: 1-64
    breakout_option: b_1x800
    allocation_strategy: sequential
    priority: 10
  - switch_class: be-rail-leaf
    zone_name: be-server-ports
    transceiver_module_type: xcvr_generic_200g
    zone_type: server
    port_spec: 1-32
    breakout_option: b_2x400
    allocation_strategy: sequential
    priority: 10
  - switch_class: be-rail-leaf
    zone_name: be-uplinks
    transceiver_module_type: xcvr_generic_200g
    zone_type: uplink
    port_spec: 33-64
    breakout_option: b_1x800
    allocation_strategy: sequential
    priority: 20
  - switch_class: be-spine
    zone_name: be-fabric-downlinks
    transceiver_module_type: xcvr_generic_200g
    zone_type: fabric
    port_spec: 1-64
    breakout_option: b_1x800
    allocation_strategy: sequential
    priority: 10

server_classes:
  - server_class_id: compute
    description: 64 training compute servers, 8 xPUs each
    category: gpu
    quantity: 64
    gpus_per_server: 8
    server_device_type: gpu_server_fe_be

