    gpus_per_server: 0
    server_device_type: srv_hh_gateway_dt
  - server_class_id: hh_controller
    description: Hedgehog converged controller node
    category: infrastructure
    quantity: 1
    gpus_per_server: 0
    server_device_type: srv_hh_controller_dt

server_nics:
