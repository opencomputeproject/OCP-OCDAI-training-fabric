    port_spec: 1-64
    breakout_option: b_1x800
    allocation_strategy: sequential
    priority: 10

server_classes:
  - server_class_id: compute
    description: 64 training compute servers, 8 xPUs each (dual-plane backend)
    category: gpu
    quantity: 64
    gpus_per_server: 8
    server_device_type: gpu_server_dual_plane

