meta:
  case_id: training_opg256_virtual
  name: Training OPG-256 Virtual
  description: Teaching-oriented OPG-256 scaffold with a full logical model and a reduced VLAB-deployable SO-C/storage subset
  version: 1
  status: draft-scaffold
  managed_by: yaml
  tags:
    - training
    - virtual
    - opg256
    - vlab
    - soc-storage
    - scale-out

notes:
  - This file is a starter topology-map scaffold and is expected to need schema updates.
  - The logical model includes scale-out and SO-C/storage fabrics.
  - The intended VLAB deployment target is only the SO-C/storage subset.
  - ESLAG is chosen for the lab subset because it provides a cleaner out-of-box host experience in VLAB.

logical_model:
  xpu_nodes: 32
  xpus_per_node: 8
  fabrics:
    - name: soc-storage
      purpose: service-storage-learning-fabric
      leaves: 2
      spines: 2
      links_per_node: 2
      speed: 25G
      host_multihoming: eslag
      leaf_to_spine_links_per_leaf: 2
    - name: scale-out
      purpose: logical-training-fabric
      leaves: 4
      spines: 2
      links_per_node: 8
      speed: 400G
      host_distribution: two-links-per-leaf

device_classes:
  - id: soc-leaf
    profile: generic-vlab-switch
    role: server-leaf
    fabric: soc-storage
  - id: soc-spine
    profile: generic-vlab-switch
    role: spine
    fabric: soc-storage
  - id: so-leaf
    profile: celestica-ds5000
    role: server-leaf
    fabric: scale-out
  - id: so-spine
    profile: celestica-ds5000
    role: spine
    fabric: scale-out
  - id: xpu-node
    profile: logical-gpu-server
    role: server

vlab_subset:
  enabled: true
  deployed_fabrics:
    - soc-storage
  deployed_hosts:
    - compute-01
    - compute-02
    - compute-03
    - compute-04
  leaves:
    - soc-leaf-01
    - soc-leaf-02
  spines:
    - soc-spine-01
    - soc-spine-02
  validation_goal:
    - validate cabling-to-intent workflow
    - validate switch and host discovery
    - validate basic host-to-host connectivity

layout_hints:
  soc_storage:
    leaf_pair: [soc-leaf-01, soc-leaf-02]
    spine_pair: [soc-spine-01, soc-spine-02]
  scale_out:
    leaves: [so-leaf-01, so-leaf-02, so-leaf-03, so-leaf-04]
    spines: [so-spine-01, so-spine-02]
    server_pattern:
      description: Each xPU-node has eight logical scale-out links distributed two-per-leaf across four scale-out leaves
      exemplar_hosts: [compute-01, compute-02, compute-03, compute-04]
